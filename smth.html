<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus X — AI Chat (Fullscreen + Sidebar + Nebula Background)</title>
    <style>
        :root {
            --bg-deep: #07070f;
            --bg-primary: #0d0d1c;
            --bg-secondary: #13132a;
            --bg-tertiary: #1a1a38;
            --accent: #7b8cff;
            --accent-soft: #5b6fd4;
            --accent-glow: #9aabff;
            --text-primary: #e4e4f2;
            --text-secondary: #a8a8c4;
            --text-muted: #6e6e8a;
            --user-bubble: #1e3060;
            --user-bubble-border: #2e4480;
            --ai-bubble: #151530;
            --ai-bubble-border: #252545;
            --border: #1e1e3a;
            --border-light: #2a2a4a;
            --success: #4cc98b;
            --warning: #e8a840;
            --error: #e0555a;
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-sans);
            color: var(--text-primary);
            /* Cosmic Nebula Image Background */
            background-image: url("https://cdn.jsdelivr.net/gh/X-NOBER/IMGS-better-cleaner@main/download.jpeg");
            /* background: 
                radial-gradient(ellipse at 20% 50%, rgba(123, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 0, 150, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 40%, rgba(255, 100, 50, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 30% 30%, rgba(180, 200, 255, 0.05) 0%, transparent 40%),
                #03030a; */
            background-size: cover;
            background-attachment: fixed;
            /* animation: nebulaShift 30s ease-in-out infinite alternate; */
        }

        @keyframes nebulaShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            /* background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 3px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 3px); */
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: row;
            background: rgba(13, 13, 28, 0.88);
            /* backdrop-filter: blur(0px); */
            overflow: hidden;
            animation: appEntrance 0.7s var(--bounce) forwards;
            opacity: 0;
            transform: scale(0.98);
        }
        @keyframes appEntrance {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(19, 19, 42, 0.7);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            gap: 12px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #7b8cff, #9a6dff);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(123, 140, 255, 0.35);
            animation: iconGlow 3s ease-in-out infinite, float 3s ease-in-out infinite;
        }
        @keyframes iconGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(123, 140, 255, 0.35); }
            50% { box-shadow: 0 4px 35px rgba(123, 140, 255, 0.8); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .brand-icon svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }
        .brand-text span:first-child {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }
        .brand-text span:last-child {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Styled Delete Everything Button */
        .btn-clear-chat {
            background: linear-gradient(135deg, #e0555a, #b0304a);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s var(--bounce);
            box-shadow: 0 4px 12px rgba(224, 85, 90, 0.3);
            letter-spacing: 0.02em;
        }
        .btn-clear-chat:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(224, 85, 90, 0.5);
        }
        .btn-clear-chat:active {
            transform: scale(0.95);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            background: transparent;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }

        .welcome-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 14px;
            animation: welcomeFade 0.8s var(--bounce);
            z-index: 1;
        }
        @keyframes welcomeFade {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #7b8cff, #9a6dff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 40px rgba(123, 140, 255, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        .welcome-title { font-size: 1.3rem; font-weight: 700; }
        .welcome-subtitle { color: var(--text-muted); font-size: 0.85rem; max-width: 320px; line-height: 1.5; }

        .message {
            display: flex;
            gap: 8px;
            animation: msgPopIn 0.4s var(--bounce) forwards;
            opacity: 0;
            z-index: 1;
        }
        @keyframes msgPopIn {
            0% { opacity: 0; transform: scale(0.95) translateY(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .message.user { flex-direction: row-reverse; align-self: flex-end; max-width: 80%; }
        .message.assistant { align-self: flex-start; max-width: 88%; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px; font-weight: 700;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .msg-avatar:hover { transform: scale(1.15); }
        .message.user .msg-avatar { background: var(--user-bubble-border); color: #c0d0ff; }
        .message.assistant .msg-avatar { background: linear-gradient(135deg, #7b8cff, #9a6dff); color: #fff; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            line-height: 1.55;
            font-size: 0.88rem;
            word-break: break-word;
            position: relative;
            transition: all 0.3s ease;
        }
        .msg-bubble:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.35); }
        .message.user .msg-bubble { background: var(--user-bubble); border: 1px solid var(--user-bubble-border); color: #d8e0ff; border-bottom-right-radius: 6px; }
        .message.assistant .msg-bubble { background: var(--ai-bubble); border: 1px solid var(--ai-bubble-border); color: var(--text-primary); border-bottom-left-radius: 6px; }

        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 8px 0 4px; font-weight: 600; }
        .msg-bubble h1 { font-size: 1.2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 3px; }
        .msg-bubble h2 { font-size: 1.05rem; }
        .msg-bubble h3 { font-size: 0.95rem; }
        .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.78rem; }
        .msg-bubble th, .msg-bubble td { border: 1px solid var(--border-light); padding: 6px 8px; text-align: left; }
        .msg-bubble th { background: rgba(123,140,255,0.1); font-weight: 600; }
        .msg-bubble pre {
            background: #0a0a18;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.5;
            margin: 8px 0;
            white-space: pre-wrap;
        }
        .msg-bubble code { font-family: var(--font-mono); font-size: 0.8rem; background: rgba(123,140,255,0.1); padding: 2px 5px; border-radius: 4px; }
        .msg-bubble pre code { background: none; padding: 0; border-radius: 0; }

        .msg-meta {
            display: flex; align-items: center; gap: 6px; margin-top: 3px; font-size: 0.65rem; color: var(--text-muted);
        }
        .message.user .msg-meta { justify-content: flex-end; }
        .msg-model-tag { font-size: 0.6rem; padding: 2px 7px; border-radius: 10px; background: rgba(123,140,255,0.12); color: var(--accent-soft); }

        .copy-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.65rem;
            padding: 2px 6px; border-radius: 4px; opacity: 0; position: absolute; bottom: 4px; right: 8px;
            transition: opacity 0.3s;
        }
        .msg-bubble:hover .copy-btn { opacity: 1; }

        .typing-indicator { display: flex; gap: 4px; padding: 3px 0; }
        .typing-indicator span {
            width: 6px; height: 6px; border-radius: 50%; background: var(--accent-soft);
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        .word {
            display: inline-block; opacity: 0; transform: translateY(5px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        .word.visible { opacity: 1; transform: translateY(0); }

        .input-bar {
            display: flex; align-items: center; gap: 8px; padding: 10px 16px;
            border-top: 1px solid var(--border); background: rgba(19,19,42,0.8); backdrop-filter: blur(10px); flex-shrink: 0; z-index: 10;
        }
        .model-pills-inline { display: flex; gap: 6px; flex-shrink: 0; }
        .model-pill {
            flex-shrink: 0; padding: 7px 12px; border-radius: 20px; border: 1.5px solid var(--border-light);
            background: var(--bg-tertiary); cursor: pointer; transition: all 0.3s var(--bounce);
            display: flex; align-items: center; gap: 5px; font-size: 0.74rem; color: var(--text-secondary);
            white-space: nowrap; position: relative; overflow: hidden;
        }
        .model-pill::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(123,140,255,0.2), transparent); opacity: 0; transition: opacity 0.3s;
        }
        .model-pill:hover { border-color: var(--accent-soft); color: var(--text-primary); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(123,140,255,0.15); }
        .model-pill:hover::before { opacity: 1; }
        .model-pill.active {
            border-color: var(--accent); background: linear-gradient(135deg, #1c2045, #1a1a40); color: #fff;
            font-weight: 600; box-shadow: 0 0 24px rgba(123,140,255,0.3); animation: activePulse 2s infinite alternate;
        }
        @keyframes activePulse {
            0% { box-shadow: 0 0 16px rgba(123,140,255,0.2); }
            100% { box-shadow: 0 0 36px rgba(123,140,255,0.55); }
        }
        .model-pill .badge { font-size: 0.55rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
        .badge-recommended { background: rgba(123,140,255,0.2); color: var(--accent-glow); }
        .badge-special { background: rgba(232,168,64,0.2); color: var(--warning); }

        .input-wrapper {
            flex: 1; position: relative; background: var(--bg-tertiary); border: 1.5px solid var(--border-light);
            border-radius: var(--radius); transition: 0.3s; overflow: hidden; min-width: 0;
        }
        .input-wrapper::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(123,140,255,0.04), transparent);
            animation: shimmer 3s infinite; pointer-events: none;
        }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }
        .input-wrapper:focus-within { border-color: var(--accent-soft); box-shadow: 0 0 28px rgba(123,140,255,0.2); }
        .input-wrapper textarea {
            width: 100%; background: transparent; border: none; outline: none; color: var(--text-primary);
            font-family: var(--font-sans); font-size: 0.85rem; padding: 10px 12px; resize: none;
            min-height: 38px; max-height: 120px; line-height: 1.5; position: relative; z-index: 1;
        }
        .input-wrapper textarea::placeholder { color: var(--text-muted); opacity: 0.7; }

        .btn-send {
            width: 38px; height: 38px; border-radius: 50%; border: none; background: linear-gradient(135deg, #7b8cff, #6b70e0);
            color: #fff; cursor: pointer; flex-shrink: 0; transition: all 0.3s var(--bounce);
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(123,140,255,0.3);
            position: relative; overflow: hidden;
        }
        .btn-send:hover { box-shadow: 0 8px 28px rgba(123,140,255,0.6); transform: translateY(-2px) scale(1.05); }
        .btn-send:disabled { background: var(--bg-tertiary); color: var(--text-muted); box-shadow: none; border: 1px solid var(--border-light); transform: none; }
        .btn-send svg { transition: transform 0.3s; }
        .btn-send:not(:disabled):hover svg { transform: rotate(15deg); }

        .ripple {
            position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5);
            transform: scale(0); animation: rippleEffect 0.6s ease-out forwards; pointer-events: none;
        }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(19, 19, 42, 0.8);
            backdrop-filter: blur(15px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            animation: sidebarSlideIn 0.5s var(--bounce);
        }
        @keyframes sidebarSlideIn {
            from { transform: translateX(60px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: var(--transition);
        }
        .sidebar-header button:hover { background: var(--border-light); color: var(--text-primary); }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.85rem;
            color: var(--text-secondary);
            position: relative;
        }
        .chat-item:hover { background: var(--bg-tertiary); }
        .chat-item.active { background: rgba(123,140,255,0.15); color: #fff; font-weight: 500; }
        .chat-item .chat-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .chat-item:hover .actions { opacity: 1; }
        .chat-item .actions button {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 0.8rem; padding: 2px 4px; border-radius: 4px; transition: var(--transition);
        }
        .chat-item .actions button:hover { color: var(--text-primary); background: rgba(255,255,255,0.1); }
        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }

        .toast-container {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            animation: toastBounceIn 0.5s var(--bounce);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        @keyframes toastBounceIn {
            0% { opacity: 0; transform: translateX(40px) scale(0.9); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .toast.error { background: #3d1015; border: 1px solid var(--error); color: #fca5a5; }
        .toast.info { background: #151530; border: 1px solid var(--accent-soft); color: #c0caff; }
        .hidden { display: none !important; }

        @media (max-width: 800px) {
            .sidebar { width: 220px; }
            .model-pills-inline .badge { display: none; }
            .model-pill { padding: 5px 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <header class="app-header">
                <div class="brand">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h6l-1 8 10-12h-6l1-8z" fill="white"/></svg>
                    </div>
                    <div class="brand-text">
                        <span>Nimbus X</span>
                        <span>AI Chat Platform</span>
                    </div>
                </div>
                <button class="btn-clear-chat" id="btnClearChat" title="Delete everything">
                    🗑️ Clear
                </button>
            </header>

            <div class="chat-area" id="chatArea">
                <div class="welcome-container" id="welcomeScreen">
                    <div class="welcome-icon">⚡</div>
                    <h2 class="welcome-title">Welcome to Nimbus X</h2>
                    <p class="welcome-subtitle">Choose a model and start chatting. Your conversations are saved automatically.</p>
                </div>
            </div>

            <div class="input-bar">
                <div class="model-pills-inline" id="modelSelector"></div>
                <div class="input-wrapper">
                    <textarea id="userInput" rows="1" placeholder="Ask anything..."></textarea>
                </div>
                <button class="btn-send" id="btnSend" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/></svg>
                </button>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span>💬 Chats</span>
                <button id="btnNewChat">+ New</button>
            </div>
            <div class="chat-list" id="chatList"></div>
            <div class="sidebar-footer">Right-click to rename or delete</div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (() => {
            const HARDCODED_API_KEY = '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';

            const MODELS = [
                {
                    id: 'openai/gpt-oss-120b:free',
                    name: 'Nimbus 5.6',
                    icon: '⚡',
                    badge: '120B',
                    badgeClass: 'badge-recommended',
                    systemMessage: 'You are Nimbus 5.6, a deep reasoning AI. Think step-by-step, explore multiple angles, and provide thorough, well-reasoned responses. Use chain-of-thought internally before answering.'
                },
                {
                    id: 'openai/gpt-oss-20b:free',
                    name: 'Nimbus 4.9',
                    icon: '🔍',
                    badge: '20B',
                    badgeClass: 'badge-special',
                    systemMessage: 'You are Nimbus 4.9, a meticulous ranker and analyst. Break down complex queries into ranked lists with clear reasoning. Provide detailed evaluations and justifications.'
                }
            ];

            const chatArea = document.getElementById('chatArea');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const userInput = document.getElementById('userInput');
            const btnSend = document.getElementById('btnSend');
            const modelSelector = document.getElementById('modelSelector');
            const btnClearChat = document.getElementById('btnClearChat');
            const toastContainer = document.getElementById('toastContainer');
            const chatListEl = document.getElementById('chatList');
            const btnNewChat = document.getElementById('btnNewChat');

            const STORAGE_CHATS = 'nimbus_chats_v9';
            const STORAGE_ACTIVE = 'nimbus_active_chat_v9';
            const STORAGE_MODEL = 'nimbus_model_v9';

            let apiKey = HARDCODED_API_KEY;
            let selectedModel = localStorage.getItem(STORAGE_MODEL) || MODELS[0].id;
            let selectedModelName = MODELS[0].name;
            let chats = [];
            let activeChatId = null;
            let messages = [];
            let isStreaming = false;
            let abortController = null;

            function getModelConfig(id) { return MODELS.find(m => m.id === id) || MODELS[0]; }
            function getSystemMessage() { return getModelConfig(selectedModel).systemMessage; }

            function loadChats() {
                try { chats = JSON.parse(localStorage.getItem(STORAGE_CHATS)) || []; } catch(e) { chats = []; }
                if (chats.length === 0) {
                    const defaultChat = { id: Date.now().toString(), name: 'New Chat', messages: [], timestamp: Date.now() };
                    chats.push(defaultChat);
                    activeChatId = defaultChat.id;
                    saveChats();
                } else {
                    activeChatId = localStorage.getItem(STORAGE_ACTIVE);
                    if (!activeChatId || !chats.find(c => c.id === activeChatId)) activeChatId = chats[0].id;
                }
                loadActiveChat();
            }

            function saveChats() {
                localStorage.setItem(STORAGE_CHATS, JSON.stringify(chats));
                localStorage.setItem(STORAGE_ACTIVE, activeChatId);
            }

            function loadActiveChat() {
                const chat = chats.find(c => c.id === activeChatId);
                if (!chat) return;
                messages = chat.messages || [];
                renderAllMessages();
                renderChatList();
            }

            function createNewChat() {
                const id = Date.now().toString();
                const count = chats.length + 1;
                const chat = { id, name: `Chat ${count}`, messages: [], timestamp: Date.now() };
                chats.push(chat);
                activeChatId = id;
                saveChats();
                loadActiveChat();
                showToast('New chat created', 'info');
            }

            function deleteChat(id) {
                if (chats.length <= 1) { showToast('Cannot delete the last chat', 'error'); return; }
                const index = chats.findIndex(c => c.id === id);
                if (index === -1) return;
                chats.splice(index, 1);
                if (activeChatId === id) activeChatId = chats[0].id;
                saveChats();
                loadActiveChat();
                showToast('Chat deleted', 'info');
            }

            function renameChat(id, newName) {
                const chat = chats.find(c => c.id === id);
                if (!chat) return;
                chat.name = newName.trim() || 'Untitled';
                saveChats();
                renderChatList();
            }

            function renderChatList() {
                chatListEl.innerHTML = '';
                chats.forEach(chat => {
                    const item = document.createElement('div');
                    item.className = `chat-item${chat.id === activeChatId ? ' active' : ''}`;
                    item.innerHTML = `
                        <span class="chat-name">${escapeHtml(chat.name)}</span>
                        <div class="actions">
                            <button class="rename-btn" title="Rename">✏️</button>
                            <button class="delete-btn" title="Delete">🗑️</button>
                        </div>
                    `;
                    item.addEventListener('click', (e) => {
                        if (e.target.closest('.rename-btn') || e.target.closest('.delete-btn')) return;
                        if (activeChatId !== chat.id) {
                            const currentChat = chats.find(c => c.id === activeChatId);
                            if (currentChat) currentChat.messages = messages;
                            activeChatId = chat.id;
                            saveChats();
                            loadActiveChat();
                        }
                    });
                    item.querySelector('.rename-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        const newName = prompt('Rename chat:', chat.name);
                        if (newName !== null) renameChat(chat.id, newName);
                    });
                    item.querySelector('.delete-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm(`Delete "${chat.name}"?`)) deleteChat(chat.id);
                    });
                    chatListEl.appendChild(item);
                });
            }

            function escapeHtml(text) { return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

            function buildModelPills() {
                modelSelector.innerHTML = '';
                MODELS.forEach(m => {
                    const pill = document.createElement('div');
                    pill.className = 'model-pill';
                    pill.dataset.model = m.id;
                    pill.dataset.name = m.name;
                    pill.innerHTML = `<span>${m.icon} ${m.name}</span><span class="badge ${m.badgeClass}">${m.badge}</span>`;
                    modelSelector.appendChild(pill);
                });
                updateActivePill();
            }

            function updateActivePill() {
                modelSelector.querySelectorAll('.model-pill').forEach(p => {
                    p.classList.toggle('active', p.dataset.model === selectedModel);
                    if (p.dataset.model === selectedModel) selectedModelName = p.dataset.name;
                });
                localStorage.setItem(STORAGE_MODEL, selectedModel);
            }

            function formatStaticContent(content) {
                if (!content) return '';
                const codeBlocks = [];
                let text = content.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
                    codeBlocks.push(code.trim());
                    return `%%CB_${codeBlocks.length-1}%%`;
                });
                text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const lines = text.split('\n');
                const result = [];
                let i = 0;
                while (i < lines.length) {
                    let line = lines[i];
                    if (line.includes('|') && i+1 < lines.length && /^\s*\|[\s\-:|]+\|\s*$/.test(lines[i+1])) {
                        const header = line;
                        i += 2;
                        const rows = [header];
                        while (i < lines.length && lines[i].includes('|')) { rows.push(lines[i]); i++; }
                        result.push(renderTable(rows));
                    } else {
                        if (/^###\s/.test(line)) result.push(`<h3>${line.replace(/^###\s+/, '')}</h3>`);
                        else if (/^##\s/.test(line)) result.push(`<h2>${line.replace(/^##\s+/, '')}</h2>`);
                        else if (/^#\s/.test(line)) result.push(`<h1>${line.replace(/^#\s+/, '')}</h1>`);
                        else {
                            let formatted = line;
                            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                            formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
                            formatted = formatted.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#9aabff;">$1</a>');
                            result.push(formatted);
                        }
                        i++;
                    }
                }
                text = result.join('<br>');
                codeBlocks.forEach((code, idx) => { text = text.replace(`%%CB_${idx}%%`, `<pre><code>${code}</code></pre>`); });
                return text;
            }

            function renderTable(rows) {
                if (!rows.length) return '';
                let html = '<table>';
                rows.forEach((row, idx) => {
                    const cells = row.split('|').filter(c => c.trim().length > 0);
                    if (idx === 0) {
                        html += '<thead><tr>';
                        cells.forEach(c => html += `<th>${c.trim()}</th>`);
                        html += '</tr></thead><tbody>';
                    } else {
                        html += '<tr>';
                        cells.forEach(c => html += `<td>${c.trim()}</td>`);
                        html += '</tr>';
                    }
                });
                html += '</tbody></table>';
                return html;
            }

            function renderAllMessages() {
                chatArea.innerHTML = '';
                if (messages.length === 0) {
                    welcomeScreen.classList.remove('hidden');
                    chatArea.appendChild(welcomeScreen);
                } else {
                    welcomeScreen.classList.add('hidden');
                    messages.forEach(msg => chatArea.appendChild(createMessageElement(msg, false)));
                    scrollChat();
                }
            }

            function createMessageElement(msg, isStreaming = false) {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.dataset.wordCount = '0';

                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                avatar.textContent = msg.role === 'user' ? 'U' : '⚡';

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                if (!isStreaming && msg.content) bubble.innerHTML = formatStaticContent(msg.content);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '📋 Copy';
                copyBtn.onclick = (e) => { e.stopPropagation(); navigator.clipboard.writeText(msg.content || ''); copyBtn.textContent = '✓'; setTimeout(()=>copyBtn.textContent='📋',1800); };
                bubble.appendChild(copyBtn);

                const meta = document.createElement('div');
                meta.className = 'msg-meta';
                meta.innerHTML = `<span>${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
                if (msg.role === 'assistant' && msg.model) meta.innerHTML += `<span class="msg-model-tag">${msg.model}</span>`;

                div.appendChild(avatar);
                const wrap = document.createElement('div'); wrap.style.flex='1';
                wrap.appendChild(bubble); wrap.appendChild(meta);
                div.appendChild(wrap);
                return div;
            }

            function scrollChat() {
                requestAnimationFrame(() => chatArea.scrollTop = chatArea.scrollHeight);
            }

            function addStreamingMsg() {
                welcomeScreen.classList.add('hidden');
                const msg = { role: 'assistant', content: '', timestamp: Date.now(), model: selectedModelName };
                messages.push(msg);
                const el = createMessageElement(msg, true);
                const bubble = el.querySelector('.msg-bubble');
                const indicator = document.createElement('span');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                bubble.insertBefore(indicator, bubble.firstChild);
                chatArea.appendChild(el);
                scrollChat();
                return el;
            }

            function renderStreamContent(bubble, content, msgEl) {
                const copyBtn = bubble.querySelector('.copy-btn');
                bubble.innerHTML = '';
                if (!content) { if(copyBtn) bubble.appendChild(copyBtn); return; }
                const lines = content.split('\n');
                const wordSpans = [];
                lines.forEach((line, li) => {
                    if (li > 0) bubble.appendChild(document.createElement('br'));
                    const words = line.split(/\s+/).filter(w => w.length > 0);
                    words.forEach((word, wi) => {
                        const span = document.createElement('span');
                        span.className = 'word';
                        span.textContent = word;
                        bubble.appendChild(span);
                        wordSpans.push(span);
                        if (wi < words.length - 1) bubble.appendChild(document.createTextNode(' '));
                    });
                });
                const prev = parseInt(msgEl.dataset.wordCount || '0');
                wordSpans.forEach((s, i) => {
                    if (i < prev) { s.style.opacity = '1'; s.style.transform = 'translateY(0)'; }
                    else requestAnimationFrame(() => s.classList.add('visible'));
                });
                msgEl.dataset.wordCount = wordSpans.length;
                if (copyBtn) bubble.appendChild(copyBtn);
            }

            function updateStreaming(el, content) {
                const bubble = el.querySelector('.msg-bubble');
                const indicator = bubble.querySelector('.typing-indicator');
                if (indicator) indicator.remove();
                renderStreamContent(bubble, content, el);
                scrollChat();
            }

            function finalizeStreaming(el, content) {
                const last = messages[messages.length-1];
                if (last) { last.content = content; last.timestamp = Date.now(); }
                const bubble = el.querySelector('.msg-bubble');
                bubble.innerHTML = formatStaticContent(content);
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn'; copyBtn.textContent = '📋 Copy';
                copyBtn.onclick = (e) => { e.stopPropagation(); navigator.clipboard.writeText(content); copyBtn.textContent = '✓'; setTimeout(()=>copyBtn.textContent='📋',1800); };
                bubble.appendChild(copyBtn);
                const chat = chats.find(c => c.id === activeChatId);
                if (chat) { chat.messages = messages; chat.timestamp = Date.now(); }
                saveChats();
                scrollChat();
            }

            async function sendMessage() {
                const content = userInput.value.trim();
                if (!content || isStreaming) return;
                userInput.value = ''; userInput.style.height = 'auto';
                const userMsg = { role: 'user', content, timestamp: Date.now() };
                messages.push(userMsg);
                const chat = chats.find(c => c.id === activeChatId);
                if (chat) { chat.messages = messages; chat.timestamp = Date.now(); saveChats(); }
                welcomeScreen.classList.add('hidden');
                chatArea.appendChild(createMessageElement(userMsg));
                scrollChat();

                isStreaming = true; btnSend.disabled = true;
                abortController = new AbortController();

                const streamEl = addStreamingMsg();
                let fullResponse = '';

                const system = getSystemMessage();
                const apiMessages = [
                    { role: 'system', content: system },
                    ...messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }))
                ];

                try {
                    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}`, 'HTTP-Referer': location.origin, 'X-Title': 'Nimbus X' },
                        body: JSON.stringify({ model: selectedModel, messages: apiMessages, stream: true, temperature: 0.7, max_tokens: 2048 }),
                        signal: abortController.signal
                    });
                    if (!res.ok) { const err = await res.text(); throw new Error(`API Error: ${res.status}`); }
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed.startsWith('data: ')) continue;
                            const data = trimmed.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta?.content;
                                if (delta) { fullResponse += delta; updateStreaming(streamEl, fullResponse); }
                            } catch(e) {}
                        }
                    }
                    finalizeStreaming(streamEl, fullResponse || '(no response)');
                } catch (e) {
                    if (e.name === 'AbortError') { fullResponse += '\n\n*[cancelled]*'; finalizeStreaming(streamEl, fullResponse); }
                    else { messages.pop(); streamEl.remove(); if (messages.length===0) welcomeScreen.classList.remove('hidden'); showToast(e.message, 'error'); }
                    const chat = chats.find(c => c.id === activeChatId);
                    if (chat) { chat.messages = messages; saveChats(); }
                } finally { isStreaming = false; abortController = null; btnSend.disabled = false; }
            }

            function cancelStream() { if (abortController) abortController.abort(); }

            function showToast(msg, type) {
                const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
                toastContainer.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 4000);
            }

            btnSend.addEventListener('click', () => isStreaming ? cancelStream() : sendMessage());
            userInput.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); isStreaming?cancelStream():sendMessage(); } });
            userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight,120)+'px'; });
            modelSelector.addEventListener('click', e => {
                const pill = e.target.closest('.model-pill'); if(!pill) return;
                selectedModel = pill.dataset.model; updateActivePill(); showToast(`Switched to ${pill.dataset.name}`, 'info');
            });
            btnClearChat.addEventListener('click', () => {
                if (isStreaming) cancelStream();
                if (messages.length && confirm('Clear current chat completely?')) {
                    const chat = chats.find(c => c.id === activeChatId);
                    if (chat) { chat.messages = []; saveChats(); }
                    loadActiveChat();
                }
            });
            btnNewChat.addEventListener('click', createNewChat);

            btnSend.addEventListener('click', function(e) {
                const ripple = document.createElement('span'); ripple.className='ripple';
                const d = Math.max(btnSend.clientWidth, btnSend.clientHeight);
                ripple.style.width=ripple.style.height=`${d}px`;
                ripple.style.left=`${e.clientX-btnSend.getBoundingClientRect().left-d/2}px`;
                ripple.style.top=`${e.clientY-btnSend.getBoundingClientRect().top-d/2}px`;
                btnSend.appendChild(ripple); setTimeout(()=>ripple.remove(),600);
            });

            buildModelPills();
            loadChats();
            renderChatList();
        })();
    </script>
</body>
</html>
